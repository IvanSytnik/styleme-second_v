# CI — Day 8 (ADR-011)
#
# Gates every PR and push to main: typecheck → build → unit tests.
#
# The dual-backend contract test needs a DEDICATED test Upstash database
# (never production). Configure repo secrets:
#   TEST_UPSTASH_REDIS_REST_URL
#   TEST_UPSTASH_REDIS_REST_TOKEN
# When absent (e.g. forks), the Upstash half self-skips with a warning —
# the suite stays green but does NOT prove backend parity. The `secrets.*`
# expressions are safe on forked PRs: GitHub simply provides empty strings.

name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  ci:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install
        run: npm ci

      - name: Build shared (must precede typecheck — api resolves dist/)
        run: npm run build:shared

      - name: Typecheck (all workspaces)
        run: npm run typecheck

      - name: Build API
        run: npm run build:api

      - name: Build Web
        run: npm run build:web
        env:
          # Build-time public env — dummies are fine, nothing runs.
          NEXT_PUBLIC_API_URL: http://localhost:3001
          NEXT_PUBLIC_SUPABASE_URL: https://example.supabase.co
          NEXT_PUBLIC_SUPABASE_ANON_KEY: dummy-anon-key
          NEXT_PUBLIC_AD_PROVIDER: 'off'

      - name: Unit tests (shared)
        run: npm run test --workspace=@styleme/shared

      - name: Unit + contract tests (api)
        run: npm run test --workspace=@styleme/api
        env:
          TEST_UPSTASH_REDIS_REST_URL: ${{ secrets.TEST_UPSTASH_REDIS_REST_URL }}
          TEST_UPSTASH_REDIS_REST_TOKEN: ${{ secrets.TEST_UPSTASH_REDIS_REST_TOKEN }}
